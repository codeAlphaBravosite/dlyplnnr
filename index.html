          }

    // FIX #3: iOS-compatible PWA icons via Canvas (PNG) instead of SVG
    function generatePWAIcon(size) {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const r = size * 0.17;
        ctx.fillStyle = '#09090b';
        ctx.beginPath();
        if (ctx.roundRect) { ctx.roundRect(0, 0, size, size, r); } else {
          ctx.moveTo(r,0); ctx.lineTo(size-r,0); ctx.quadraticCurveTo(size,0,size,r);
          ctx.lineTo(size,size-r); ctx.quadraticCurveTo(size,size,size-r,size);
          ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
          ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0); ctx.closePath();
        }
        ctx.fill();
        ctx.fillStyle = '#fbbf24';
        ctx.font = `bold ${Math.round(size*0.62)}px Georgia, serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('C', size/2, size/2 + size*0.04);
        return canvas.toDataURL('image/png');
      } catch(e) { return ''; }
    }

    const icon192 = generatePWAIcon(192);
    const icon512 = generatePWAIcon(512);
    const manifest = {
      name: "Chronos Elite", short_name: "Chronos",
      description: "AI-powered daily planner for high-performers",
      start_url: "./", display: "standalone",
      background_color: "#09090b", theme_color: "#09090b",
      icons: [
        { src: icon192, sizes: "192x192", type: "image/png" },
        { src: icon512, sizes: "512x512", type: "image/png" }
      ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);

    // FIX #1: Blob-URL Service Workers cannot intercept page requests (wrong scope).
    // For full offline PWA support, deploy a separate sw.js file from your server root.

const fmt12 = (t) => {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
};

const localISO = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const toMin = (t) => { const [h,m] = t.split(':').map(Number); return h*60+m; };

// FIX #13: Overlap detection
const findOverlaps = (schedule) => {
  const ids = new Set();
  for (let i = 0; i < schedule.length; i++) {
    for (let j = i+1; j < schedule.length; j++) {
      const a = schedule[i], b = schedule[j];
      if (toMin(a.startTime) < toMin(b.endTime) && toMin(a.endTime) > toMin(b.startTime)) {
        ids.add(a.id); ids.add(b.id);
      }
    }
  }
  return ids;
};

// FIX #15: Safe duration (no negative/NaN)
const safeDur = (s, e) => Math.max(0, toMin(e) - toMin(s));

const saveHistory = (schedule, planDate) => {
  try {
    const h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
    h[planDate] = { schedule, savedAt: new Date().toISOString() };
    const trimmed = {};
    Object.keys(h).sort().reverse().slice(0,7).forEach(k => { trimmed[k] = h[k]; });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed));
  } catch(e) {}
};

// NOTIFICATION MANAGER
// ═══════════════════════════════════════════════════════════════════════════════
const notifTimers = [];

const clearNotifs = () => { notifTimers.forEach(t => clearTimeout(t)); notifTimers.length = 0; };

const scheduleNotifs = (schedule, planDate) => {
  clearNotifs();
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (planDate !== localISO()) return;
  const nowMs = Date.now();

  schedule.forEach(task => {
    if (task.completed) return;
    const [h, m] = task.startTime.split(':').map(Number);
    const startMs = new Date().setHours(h, m, 0, 0); // setHours returns a timestamp number
    const warnMs  = startMs - 2 * 60 * 1000; // 2 min before

    if (warnMs > nowMs) {
      notifTimers.push(setTimeout(() => {
        new Notification(`⏰ Up next: ${task.activity}`, {
          body: `Starts in 2 min · ${fmt12(task.startTime)}`,
          tag: `warn-${task.id}`, silent: false,
        });
      }, warnMs - nowMs));
    }
    if (startMs > nowMs) {
      notifTimers.push(setTimeout(() => {
        new Notification(`🚀 ${task.activity}`, {
          body: `${fmt12(task.startTime)} → ${fmt12(task.endTime)} · ${task.energyRequired} energy`,
          tag: `start-${task.id}`, silent: false,
        });
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
      }, startMs - nowMs));
    }
  });
};

const askNotifPermission = async () => {
  if (!('Notification' in window)) return 'unsupported';
  if (Notification.permission !== 'default') return Notification.permission;
  return await Notification.requestPermission();
};

const MODEL = 'gemini-3-flash-preview';

const callGemini = async (systemInstruction, userText, apiKey, temp=0.7, _attempt=1) => {
  let res;
  try {
    res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey.trim()}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemInstruction }] },
          contents: [{ role: 'user', parts: [{ text: userText }] }],
          generation_config: { response_mime_type: 'application/json', temperature: temp }
        })
      }
    );
  } catch(networkErr) {
    // Network failure — retry once after 1.5s
    if (_attempt < 2) {
      await new Promise(r => setTimeout(r, 1500));
      return callGemini(systemInstruction, userText, apiKey, temp, 2);
    }
    throw new Error('Network error. Check your connection and try again.');
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const msg = err?.error?.message || `HTTP ${res.status}`;
    if (res.status === 400 && msg.toLowerCase().includes('api key')) throw new Error('Invalid API key. Check Settings.');
    if (res.status === 429) throw new Error('Rate limit hit. Wait a moment and try again.');
    // Retry once on transient server errors (5xx)
    if (res.status >= 500 && _attempt < 2) {
      await new Promise(r => setTimeout(r, 1500));
      return callGemini(systemInstruction, userText, apiKey, temp, 2);
    }
    throw new Error(`API error: ${msg}`);
  }

  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) {
    // Empty response — retry once
    if (_attempt < 2) {
      await new Promise(r => setTimeout(r, 1000));
      return callGemini(systemInstruction, userText, apiKey, temp, 2);
    }
    throw new Error('Empty response from Gemini. Please try again.');
  }

  // Robust JSON cleanup (handles occasional markdown fences despite mime type)
  try {
    return JSON.parse(text.replace(/```[\w]*\n?/gi, '').replace(/```/g, '').trim());
  } catch(parseErr) {
    // JSON parse failed — retry once at lower temperature for stricter output
    if (_attempt < 2) {
      await new Promise(r => setTimeout(r, 800));
      return callGemini(systemInstruction, userText, apiKey, Math.max(0.1, temp - 0.3), 2);
    }
    throw new Error('Could not parse AI response. Please try again.');
  }
};

const generateSchedule = async (rawInput, apiKey) => {
  if (!apiKey?.trim()) throw new Error('No API key. Add your Gemini key in Settings (⚙).');
  const today = localISO();
  const todayStr = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // Build tomorrow's ISO string for the prompt default
  const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate() + 1);
  const tomorrow = `${tomorrowDate.getFullYear()}-${String(tomorrowDate.getMonth()+1).padStart(2,'0')}-${String(tomorrowDate.getDate()).padStart(2,'0')}`;

  const sys = `You are an elite productivity coach. Turn a raw task brain dump into a structured, time-blocked daily schedule.

Today is ${todayStr} (${today}). Tomorrow is ${tomorrow}.

━━ SCHEDULING RULES ━━
1. TIME BLOCKING: Group related tasks into focused blocks. Batch similar work together.
2. ENERGY ARC: Schedule high-cognitive tasks (Deep Work) before 13:00. Admin, meetings, and routine tasks in the afternoon. Light tasks and breaks toward evening.
3. BREAKS: Include at least one short Break block (15–30 min) per 3-hour work block. A lunch break if the schedule spans midday.
4. REALISM: Do not overload. Max ~10 tasks. End the day by 21:00. ZERO time overlaps — every task must have a unique, non-overlapping window.
5. GAPS: Tasks may have natural gaps between them. Do NOT force-fill every minute. A gap is fine — an overlap is never acceptable.
6. DATE HANDLING:
   - "today" → ${today}
   - "tomorrow" → ${tomorrow}
   - Named days ("Monday", "Friday", etc.) → calculate the next occurrence from today
   - "next week" → next Monday (${(() => { const d = new Date(); const day = d.getDay(); const diff = (8 - day) % 7 || 7; d.setDate(d.getDate() + diff); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })()})
   - If no date context is given at all → default to tomorrow (${tomorrow})
   - Always output the resolved date as "date" in the JSON.
7. START TIME: If the user gives no start times, begin the schedule at 08:00.
8. SUBTASKS: Include subtasks ONLY when the user provides nested items (bullet points, dashes, numbered steps) under a task, OR explicitly uses words like "steps", "subtasks", "breakdown". For all other tasks, output subtasks as [].

━━ NAMING RULES (critical) ━━
- "activity": 2–4 words max. MUST start with an action verb.
  ✓ GOOD: "Morning Workout", "Deep Work Sprint", "Team Standup", "Strategy Review", "Email Triage", "Lunch Break", "Read Industry News"
  ✗ BAD: "High-Performance Morning Routine", "Strategic Recovery & Nourishment Block", "Focused Deep Work Session for Q3"
- "notes": ONE practical, specific tip. Max 12 words. No fluff.
  ✓ GOOD: "No phone for the first 90 minutes.", "Reply only to urgent emails.", "Eat protein before this session."
  ✗ BAD: "Fuel your brain with high-omega-3 nutrition for peak cognitive output."

━━ OUTPUT FORMAT ━━
Respond ONLY with valid JSON. No markdown, no explanation, no code fences:
{"date":"YYYY-MM-DD","schedule":[{"startTime":"HH:MM","endTime":"HH:MM","activity":"string","category":"Deep Work"|"Health"|"Admin"|"Meeting"|"Break","energyRequired":"High"|"Medium"|"Low","notes":"string","subtasks":[{"title":"string"}]}]}`;

  const parsed = await callGemini(sys, rawInput.trim(), apiKey, 0.65);
  const schedule = (parsed.schedule||[]).map(item => ({
    ...item, id: crypto.randomUUID(), completed: false, skipped: false,
    subtasks: (item.subtasks||[]).map(st => ({ id: crypto.randomUUID(), title: st.title, completed: false }))
  }));
  return { schedule, planDate: parsed.date || today };
};

const fixScheduleAI = async (schedule, planDate, apiKey) => {
  if (!apiKey?.trim()) throw new Error('No API key. Add your Gemini key in Settings (⚙).');

  const sys = `You are a schedule optimizer. Fix the provided schedule JSON:
1. Resolve ALL time overlaps by adjusting start/end times.
2. Fill dead-air gaps logically without adding new tasks.
3. Maintain energy arc: high-cognitive morning, low-energy afternoon.
4. Keep every task's id, activity name, category, energyRequired intact.
5. Never add new tasks. Preserve original task count.
Respond ONLY with JSON (no markdown):
{"schedule":[{"id":"string","startTime":"HH:MM","endTime":"HH:MM","activity":"string","category":"string","energyRequired":"string","notes":"string","subtasks":[]}]}`;

  const input = schedule.map(t => ({
    id:t.id, startTime:t.startTime, endTime:t.endTime,
    activity:t.activity, category:t.category, energyRequired:t.energyRequired, notes:t.notes, subtasks:[]
  }));

  const parsed = await callGemini(sys, `Fix this schedule for ${planDate}:\n${JSON.stringify(input,null,2)}`, apiKey, 0.3);
  const fixedMap = {};
  (parsed.schedule||[]).forEach(t => { fixedMap[t.id] = t; });

  // Merge fixed times back, preserve completed/subtask state
  return schedule.map(t => fixedMap[t.id]
    ? { ...t, startTime: fixedMap[t.id].startTime, endTime: fixedMap[t.id].endTime, notes: fixedMap[t.id].notes || t.notes }
    : t
  );
};

  const [editing, setEditing] = useState(null);
  const [resetTap, setResetTap] = useState(false);

  // FIX #5: Always sort by start time (manual-added tasks appear in correct order)
  const sorted = [...schedule].sort((a,b) => a.startTime.localeCompare(b.startTime));
  const overlaps = findOverlaps(sorted);
  const hasOverlaps = overlaps.size > 0;

  const title = () => {
    const t = localISO();
    if (planDate === t) return "Today's Blueprint";
    const [y,mo,d] = planDate.split('-').map(Number);
    const dt = new Date(y,mo-1,d);
    const tmr = new Date(); tmr.setDate(tmr.getDate()+1);
    if (dt.toDateString()===tmr.toDateString()) return "Tomorrow's Blueprint";
    return `Blueprint — ${dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
  };

  // FIX #9: Double-tap confirmation for "New Plan"
  const handleReset = () => {
    if (!resetTap) { setResetTap(true); setTimeout(()=>setResetTap(false), 2800); return; }
    onReset(); setResetTap(false);
  };

  return (
    <div className="flex flex-col h-full animate-slide-up max-w-2xl mx-auto w-full relative">
      {/* Sticky header */}
      <div className="flex items-center justify-between px-4 py-3 md:px-6 border-b border-white/5 bg-obsidian/95 backdrop-blur-md sticky top-0 z-20">
        <div>
          <h2 className="text-xl font-serif font-bold text-white">{title()}</h2>
          <div className="flex items-center gap-1.5 mt-0.5">
            <Ic n="CalDays" c="w-3 h-3 text-mist" />
            <p className="text-xs text-mist uppercase tracking-widest">{planDate}</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          {/* AI Fix Schedule button */}
          <button onClick={onFix} disabled={fixing || schedule.length===0}
            title={hasOverlaps ? 'Fix overlapping tasks with AI' : 'Optimize schedule with AI'}
            className={`focus-ring flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-semibold transition-all min-h-[40px]
              ${hasOverlaps
                ? 'bg-amber-500/20 text-amber-300 border border-amber-500/35 hover:bg-amber-500/30 overlap-pulse'
                : 'bg-white/5 text-mist border border-white/10 hover:bg-white/10 hover:text-white'}
              ${fixing||schedule.length===0 ? 'opacity-50 cursor-not-allowed' : ''}`}>
            {fixing
              ? <svg className="spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4" strokeLinecap="round"/></svg>
              : <Ic n="Wand" c="w-3.5 h-3.5" />}
            {hasOverlaps ? 'Fix Overlaps' : 'AI Fix'}
          </button>

          {/* New Plan — double-tap confirm */}
          <button onClick={handleReset}
            className={`focus-ring text-xs transition-all underline min-h-[40px] px-2 rounded
              ${resetTap ? 'text-red-400 font-bold no-underline bg-red-500/10 rounded-lg px-3' : 'text-mist hover:text-white decoration-white/20 hover:decoration-white'}`}>
            {resetTap ? 'Tap to confirm' : 'New Plan'}
          </button>
        </div>
      </div>

      {/* Overlap warning banner */}
      {hasOverlaps && (
        <div className="mx-4 mt-3 p-3 bg-amber-900/20 border border-amber-500/30 rounded-xl flex items-center gap-2.5 shrink-0">
          <Ic n="AlertT" c="w-4 h-4 text-amber-400 shrink-0" />
          <p className="text-xs text-amber-200">
            <strong>{overlaps.size} tasks overlap.</strong> Highlighted below — tap <strong>AI Fix</strong> to resolve automatically.
          </p>
        </div>
      )}

      {/* Task list */}
      {/* scroll-area replaces mb-safe: clears nav + FAB + safe-area bottom */}
      <div className="flex-grow overflow-y-auto p-3 md:p-4 space-y-2.5 scroll-area">
        {sorted.length===0 ? (
          <div className="text-center py-20 text-mist">
            <p className="text-sm">No tasks scheduled.</p>
            <button onClick={onAdd} className="focus-ring mt-4 text-amber-400 font-semibold text-sm min-h-[44px] px-4">+ Add your first task</button>
          </div>
        ) : sorted.map((item, i) => {
          const done = item.completed;
          const skipped = item.skipped;
          const overlapping = overlaps.has(item.id) && !done && !skipped;
          const subTotal = item.subtasks?.length || 0;
          const subDone  = item.subtasks?.filter(s=>s.completed).length || 0;
          const borderColor = CAT_BORDER[item.category] || '#4b5563';
          const dur = safeDur(item.startTime, item.endTime);
          const durLabel = dur >= 60 ? `${Math.floor(dur/60)}h${dur%60>0?` ${dur%60}m`:''}` : `${dur}m`;
          return (
            <div key={item.id} onClick={()=>setEditing(item)}
              style={{animationDelay:`${i*35}ms`, borderLeftColor: borderColor}}
              className={`relative flex gap-0 rounded-xl border border-l-4 transition-all duration-200 cursor-pointer overflow-hidden
                ${overlapping
                  ? 'bg-amber-900/15 border-amber-500/30 shadow-amber-900/20 shadow-lg'
                  : done || skipped
                  ? 'bg-charcoal/20 border-white/5 opacity-45'
                  : 'bg-charcoal/60 border-white/8 hover:bg-charcoal hover:border-white/12 shadow-black/20 shadow-md'}`}>
              {overlapping && (
                <div className="absolute top-2.5 right-10 text-amber-400 z-10">
                  <Ic n="AlertT" c="w-3.5 h-3.5" />
                </div>
              )}
              {skipped && (
                <div className="absolute top-2.5 left-[72px] z-10">
                  <span className="text-[10px] uppercase tracking-wider bg-gray-700/60 text-gray-400 px-1.5 py-0.5 rounded-full font-semibold">Skipped</span>
                </div>
              )}

              {/* Time column */}
              <div className="flex flex-col items-center min-w-[64px] pt-3 pb-3 px-2 shrink-0">
                <span className={`text-xs font-bold whitespace-nowrap ${done||skipped?'text-gray-600':'text-white'}`}>{fmt12(item.startTime)}</span>
                <div className="flex flex-col items-center flex-grow my-1 w-full">
                  <div className={`w-px flex-grow ${done||skipped?'bg-white/5':'bg-gradient-to-b from-white/20 to-transparent'}`}></div>
                  <span className={`text-[9px] whitespace-nowrap font-semibold my-0.5 ${done||skipped?'text-gray-700':'text-mist/55'}`}>{durLabel}</span>
                  <div className={`w-px flex-grow ${done||skipped?'bg-white/5':'bg-gradient-to-t from-white/20 to-transparent'}`}></div>
                </div>
                <span className={`text-[10px] whitespace-nowrap font-medium ${done||skipped?'text-gray-700':'text-mist/70'}`}>{fmt12(item.endTime)}</span>
              </div>

              {/* Divider */}
              <div className="w-px bg-white/5 self-stretch shrink-0"></div>

              {/* Content */}
              <div className="flex-grow min-w-0 px-3 pt-3 pb-3 pr-12">
                <h3 className={`text-sm font-semibold leading-snug clamp-2 ${done?'text-gray-500 line-through':skipped?'text-gray-600 line-through':'text-white'}`}>{item.activity}</h3>
                {item.notes && !skipped && <p className={`text-xs mt-1 clamp-1 ${done?'text-gray-700':'text-gray-500'}`}>{item.notes}</p>}
                <div className="flex flex-wrap items-center gap-1.5 mt-2">
                  <span className={`px-1.5 py-px rounded-full text-[10px] uppercase tracking-wide border font-semibold ${ENERGY_CLS[item.energyRequired]||ENERGY_CLS.Low}`}>{item.energyRequired}</span>
                  <span className="flex items-center gap-1 px-1.5 py-px rounded-md bg-white/5 text-[10px] text-mist font-medium">
                    {CAT_ICONS[item.category]||<Ic n="Briefcase" c="h-3 w-3 text-gray-400"/>}
                    <span>{item.category}</span>
                  </span>
                  {subTotal>0 && (
                    <span className="flex items-center gap-1 px-1.5 py-px rounded-md bg-white/5 text-[10px] text-mist">
                      <Ic n="ListChk" c="w-3 h-3" />{subDone}/{subTotal}
                    </span>
                  )}
                </div>
              </div>

              {/* Completion toggle */}
              <button
                onClick={e => {
                  e.stopPropagation();
                  onUpdate({ ...item, completed: !done, skipped: false });
                  if (navigator.vibrate) navigator.vibrate(40);
                }}
                className="focus-ring absolute right-1 top-1/2 -translate-y-1/2 min-w-[44px] min-h-[44px] flex items-center justify-center transition-colors z-10">
                <Ic n={done?'Check2':'Circle'} c={`w-6 h-6 ${done?'text-emerald-500':'text-gray-700'}`} />
              </button>
            </div>
          );
        })}
        <div className="py-4 flex justify-center opacity-20"><div className="w-10 h-0.5 bg-white/30 rounded-full"></div></div>
      </div>

      {/* FAB — positioned above bottom nav with safe area */}
      <div className="absolute bottom-[5.5rem] right-4 md:right-6 z-30" style={{bottom:`calc(5.5rem + env(safe-area-inset-bottom))`}}>
        <button onClick={onAdd}
          className="focus-ring bg-amber-500 hover:bg-amber-400 text-obsidian rounded-full shadow-[0_0_28px_rgba(251,191,36,0.4)] transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center min-w-[56px] min-h-[56px]">
          <Ic n="Plus" c="w-6 h-6" />
        </button>
      </div>

      <EditTaskModal task={editing} open={!!editing} onClose={()=>setEditing(null)}
        onSave={t=>{onUpdate(t);setEditing(null);}}
        onDelete={id=>{onDelete(id);setEditing(null);}} />
    </div>
  );
}

// RESCHEDULE MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function RescheduleModal({ task, open, onClose, onReschedule }) {
  const [custom, setCustom] = useState('');
  const [err, setErr] = useState('');
  useEffect(() => { if (open) { setCustom(''); setErr(''); } }, [open]);
  if (!open || !task) return null;

  const dur = safeDur(task.startTime, task.endTime);
  const presets = [
    { label: '+30 min',  mins: 30  },
    { label: '+1 hour',  mins: 60  },
    { label: '+2 hours', mins: 120 },
    { label: '+3 hours', mins: 180 },
  ];

  const applyOffset = (offsetMins) => {
    const newStart = toMin(task.startTime) + offsetMins;
    if (newStart >= 24*60) { setErr('That time is past midnight.'); return; }
    const newEnd = Math.min(newStart + dur, 24*60 - 1);
    const fmt = (m) => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    onReschedule({ ...task, startTime: fmt(newStart), endTime: fmt(newEnd), skipped: false });
  };

  const applyCustom = () => {
    if (!custom) { setErr('Pick a time first.'); return; }
    const [h,m] = custom.split(':').map(Number);
    const startMin = h*60+m;
    if (startMin < toMin(task.startTime)) { setErr('New time must be in the future.'); return; }
    const endMin = Math.min(startMin + dur, 24*60-1);
    const fmt = (v) => `${String(Math.floor(v/60)).padStart(2,'0')}:${String(v%60).padStart(2,'0')}`;
    onReschedule({ ...task, startTime: fmt(startMin), endTime: fmt(endMin), skipped: false });
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/70 backdrop-blur-sm animate-fade-in">
      <div className="bg-charcoal border border-white/10 w-full max-w-lg rounded-t-2xl sm:rounded-2xl shadow-2xl overflow-hidden animate-slide-up">
        <div className="flex items-center justify-between p-5 border-b border-white/5 bg-obsidian/50 shrink-0">
          <div>
            <h3 className="text-lg font-serif font-bold text-white">Reschedule Task</h3>
            <p className="text-xs text-mist mt-0.5 clamp-1">{task.activity}</p>
          </div>
          <button onClick={onClose} className="focus-ring min-w-[44px] min-h-[44px] flex items-center justify-center text-mist hover:text-white rounded-lg transition-colors">
            <Ic n="X" c="w-5 h-5"/>
          </button>
        </div>
        <div className="p-5 space-y-4">
          <p className="text-xs text-mist">Push this task forward by:</p>
          <div className="grid grid-cols-2 gap-2.5">
            {presets.map(p => (
              <button key={p.mins} onClick={() => applyOffset(p.mins)}
                className="focus-ring py-3.5 rounded-xl bg-white/5 hover:bg-white/10 border border-white/8 hover:border-white/15 text-white font-semibold text-sm transition-all active:scale-95 min-h-[52px]">
                {p.label}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <div className="flex-1 relative">
              <input type="time" value={custom} onChange={e=>{setCustom(e.target.value);setErr('');}}
                className="focus-ring w-full bg-obsidian border border-white/10 rounded-xl p-3 text-white focus:border-amber-500/50 focus:outline-none text-sm" />
            </div>
            <button onClick={applyCustom}
              className="focus-ring px-5 py-3 bg-amber-500 hover:bg-amber-400 text-obsidian rounded-xl font-bold text-sm transition-all min-h-[52px]">
              Set
            </button>
          </div>
          {err && <p className="text-xs text-red-400 flex items-center gap-1.5"><Ic n="AlertC" c="w-3.5 h-3.5 shrink-0"/>{err}</p>}
          <button onClick={onClose}
            className="focus-ring w-full py-3 rounded-xl border border-white/10 text-mist hover:text-white hover:border-white/20 font-medium text-sm transition-all min-h-[48px]">
            Cancel
          </button>
        </div>
      </div>
    </div>
  );
}

// FOCUS MODE
// ═══════════════════════════════════════════════════════════════════════════════
function FocusMode({ schedule, planDate, onUpdate }) {
  const [now, setNow] = useState(new Date());
  const [reschedTask, setReschedTask] = useState(null);
  useEffect(() => { const t = setInterval(()=>setNow(new Date()), 1000); return ()=>clearInterval(t); }, []);

  const isToday = planDate === localISO();

  if (!isToday) {
    const [y,mo,d] = planDate.split('-').map(Number);
    const fmt = new Date(y,mo-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    return (
      <div className="flex flex-col h-full p-6 max-w-2xl mx-auto w-full items-center justify-center text-center animate-fade-in">
        <div className="w-20 h-20 bg-charcoal/50 rounded-full flex items-center justify-center mb-5 border border-white/5 relative">
          <div className="absolute inset-0 bg-amber-500/10 blur-xl rounded-full"></div>
          <Ic n="Calendar" c="w-9 h-9 text-mist relative z-10" />
        </div>
        <h2 className="text-2xl font-bold text-white mb-2">Scheduled for Future</h2>
        <p className="text-mist max-w-xs leading-relaxed text-sm">
          Blueprint for <span className="text-amber-400 font-semibold">{fmt}</span>. Focus Mode activates on that day.
        </p>
        <div className="mt-8 p-4 bg-charcoal/30 rounded-xl border border-white/5 w-full max-w-sm text-left opacity-60">
          {schedule.slice(0,3).map(t=>(
            <div key={t.id} className="flex gap-3 text-sm py-1">
              <span className="text-gray-500 font-mono text-xs pt-0.5 shrink-0">{t.startTime}</span>
              <span className="text-gray-300 clamp-1">{t.activity}</span>
            </div>
          ))}
          {schedule.length>3 && <p className="text-xs text-center pt-1 text-gray-600 italic">+{schedule.length-3} more</p>}
        </div>
      </div>
    );
  }

  const sorted = [...schedule].sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const cur = now.getHours()*60+now.getMinutes();

  const overdueList = sorted.filter(t => !t.completed && !t.skipped && toMin(t.endTime) <= cur);
  // Active task is always found independently — not suppressed by overdue
  const activeTask  = sorted.find(t => { const s=toMin(t.startTime),e=toMin(t.endTime); return !t.completed && !t.skipped && cur>=s && cur<e; });
  const next        = sorted.find(t => toMin(t.startTime) > cur && !t.completed && !t.skipped);

  // Hero: active task takes first priority; fallback to first overdue
  const heroTask  = activeTask || overdueList[0] || null;
  // isOverdue only true when hero IS an overdue task (no active task running)
  const isOverdue = !activeTask && overdueList.length > 0;
  // Overdue queue: if active task is hero show ALL overdue; otherwise show all except the hero
  const overdueRest = activeTask ? overdueList : overdueList.slice(1);

  const progress = (() => {
    if (!heroTask || isOverdue) return isOverdue ? 100 : 0;
    const s=toMin(heroTask.startTime), e=toMin(heroTask.endTime), total=e-s;
    if (total<=0) return 0;
    return Math.min(100,Math.max(0,((cur-s)/total)*100));
  })();

  const accent  = isOverdue ? 'text-red-500' : 'text-amber-500';
  const aBorder = isOverdue ? 'border-red-500/25' : 'border-amber-500/25';
  const halo    = isOverdue ? 'bg-red-500/8' : 'bg-amber-500/5';

  const doComplete = (task) => {
    onUpdate({...task, completed:true, skipped:false});
    if (navigator.vibrate) navigator.vibrate([60,30,60]);
  };
  const doSkip = (task) => {
    onUpdate({...task, skipped:true, completed:false});
    if (navigator.vibrate) navigator.vibrate(30);
  };
  const doReschedule = (updated) => {
    onUpdate(updated);
    setReschedTask(null);
  };

  return (
    <div className="flex flex-col h-full animate-fade-in max-w-2xl mx-auto w-full overflow-y-auto scroll-area">
      {/* Header */}
      <div className="text-center pt-6 pb-4 shrink-0 px-6">
        <h2 className="text-xl font-serif font-bold text-white">Deep Focus</h2>
        <p className="text-xs text-mist uppercase tracking-widest mt-1">{now.toLocaleTimeString([],{hour:'numeric',minute:'2-digit',second:'2-digit'})}</p>
      </div>

      {/* Overdue queue: all overdue tasks except the hero */}
      {overdueRest.length > 0 && (
        <div className="px-4 pb-3 shrink-0">
          <p className="text-[10px] text-red-400/80 uppercase tracking-widest font-semibold mb-2 flex items-center gap-1.5">
            <Ic n="AlertT" c="w-3 h-3"/> {overdueRest.length} {activeTask ? 'overdue' : 'more overdue'}
          </p>
          <div className="space-y-1.5">
            {overdueRest.map(t => (
              <div key={t.id} className="flex items-center gap-2 bg-red-900/10 border border-red-500/20 rounded-xl px-3 py-2">
                <span className="text-xs text-red-300 font-semibold shrink-0">{fmt12(t.startTime)}</span>
                <span className="text-xs text-gray-300 flex-grow clamp-1">{t.activity}</span>
                <button onClick={()=>doComplete(t)}
                  className="focus-ring shrink-0 text-[10px] text-emerald-400 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 px-2 py-1 rounded-lg font-semibold transition-colors min-h-[30px]">Done</button>
                <button onClick={()=>doSkip(t)}
                  className="focus-ring shrink-0 text-[10px] text-gray-400 bg-white/5 hover:bg-white/10 px-2 py-1 rounded-lg font-semibold transition-colors min-h-[30px]">Skip</button>
                <button onClick={()=>setReschedTask(t)}
                  className="focus-ring shrink-0 text-[10px] text-amber-400 bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/20 px-2 py-1 rounded-lg font-semibold transition-colors min-h-[30px]">Move</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Hero focus card */}
      <div className="flex-grow flex flex-col items-center relative px-6">
        <div className={`absolute inset-0 blur-[100px] rounded-full animate-pulse pointer-events-none ${halo}`}></div>

        {heroTask ? (
          <div className="relative z-10 text-center w-full max-w-lg pt-2">
            {/* Progress ring */}
            <div className={`mb-5 inline-flex items-center justify-center w-28 h-28 rounded-full border-4 bg-charcoal/50 relative ${aBorder}`}>
              <svg className="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" strokeWidth="8"
                  className={accent} strokeDasharray="289.02" strokeDashoffset={289.02*(1-progress/100)} strokeLinecap="round"/>
              </svg>
              {isOverdue ? <Ic n="AlertC" c={`w-9 h-9 ${accent}`}/> : <Ic n="Play" c={`w-9 h-9 ${accent}`}/>}
            </div>

            <div className="space-y-2">
              <span className={`px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider border ${isOverdue?'bg-red-500/10 text-red-400 border-red-500/20':'bg-amber-500/10 text-amber-400 border-amber-500/20'}`}>
                {isOverdue ? `⚠ Overdue · ${fmt12(heroTask.startTime)}` : 'Current Task'}
              </span>
              <h1 className="text-2xl md:text-3xl font-bold text-white leading-tight px-2">{heroTask.activity}</h1>
              <div className="flex items-center justify-center gap-2 text-mist text-sm">
                <Ic n="Clock" c="w-4 h-4" /> {fmt12(heroTask.startTime)} – {fmt12(heroTask.endTime)}
              </div>
              {heroTask.notes && <p className="text-gray-400 italic text-sm max-w-xs mx-auto clamp-2">"{heroTask.notes}"</p>}

              {heroTask.subtasks?.length > 0 && (
                <div className="mt-4 bg-charcoal/50 rounded-xl border border-white/5 p-4 text-left">
                  <h4 className="text-xs uppercase tracking-wider text-mist mb-3 font-semibold">Subtasks</h4>
                  <div className="space-y-1">
                    {heroTask.subtasks.map(st=>(
                      <button key={st.id}
                        onClick={()=>onUpdate({...heroTask,subtasks:heroTask.subtasks.map(s=>s.id===st.id?{...s,completed:!s.completed}:s)})}
                        className="focus-ring w-full flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 transition-colors text-left min-h-[44px]">
                        <Ic n={st.completed?'CheckSq':'Square'} c={`w-5 h-5 ${st.completed?'text-amber-500':'text-gray-500'} shrink-0`}/>
                        <span className={`text-sm ${st.completed?'text-gray-500 line-through':'text-white'}`}>{st.title}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Action buttons */}
              <div className="pt-4 pb-6 space-y-3">
                {!heroTask.completed ? (
                  <button onClick={()=>doComplete(heroTask)}
                    className="focus-ring flex items-center gap-2 px-8 py-3.5 bg-white text-obsidian rounded-full font-bold hover:bg-gray-100 transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(255,255,255,0.2)] mx-auto min-h-[52px]">
                    <Ic n="Check2" c="w-5 h-5" /> Mark Complete
                  </button>
                ) : (
                  <div className="flex items-center gap-2 justify-center text-emerald-400 font-bold text-lg">
                    <Ic n="Check2" c="w-6 h-6" /> Completed
                  </div>
                )}

                {/* Overdue-only actions: Skip or Reschedule */}
                {isOverdue && !heroTask.completed && (
                  <div className="flex items-center justify-center gap-3">
                    <button onClick={()=>setReschedTask(heroTask)}
                      className="focus-ring flex items-center gap-1.5 px-5 py-2.5 bg-amber-500/10 border border-amber-500/25 text-amber-300 rounded-full text-sm font-semibold hover:bg-amber-500/20 transition-all min-h-[44px]">
                      <Ic n="Clock" c="w-4 h-4"/> Reschedule
                    </button>
                    <button onClick={()=>doSkip(heroTask)}
                      className="focus-ring flex items-center gap-1.5 px-5 py-2.5 bg-white/5 border border-white/10 text-gray-400 rounded-full text-sm font-semibold hover:bg-white/10 transition-all min-h-[44px]">
                      Skip
                    </button>
                  </div>
                )}
              </div>
            </div>
          </div>
        ) : (
          <div className="text-center z-10 pt-6">
            <div className="w-24 h-24 bg-charcoal rounded-full flex items-center justify-center mx-auto mb-6 border border-white/10">
              <Ic n="Coffee" c="w-10 h-10 text-blue-300"/>
            </div>
            <h2 className="text-2xl font-bold text-white mb-2">Between Blocks</h2>
            <p className="text-mist text-sm">No active task right now. Rest or prepare for what's next.</p>
            {next && (
              <div className="mt-8 p-4 bg-charcoal/40 rounded-xl border border-white/5 inline-block">
                <p className="text-xs text-mist uppercase tracking-wide mb-1">Up Next at {fmt12(next.startTime)}</p>
                <p className="text-white font-semibold">{next.activity}</p>
              </div>
            )}
          </div>
        )}
      </div>

      <RescheduleModal task={reschedTask} open={!!reschedTask} onClose={()=>setReschedTask(null)} onReschedule={doReschedule} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// STATS VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function StatsView({ schedule }) {
  const total   = schedule.length;
  const done    = schedule.filter(t=>t.completed).length;
  const skipped = schedule.filter(t=>t.skipped).length;
  const pending = total - done - skipped;
  const rate    = total>0 ? Math.round((done/total)*100) : 0;

  // FIX #15: safeDur prevents negative/NaN values
  const catStats = schedule.reduce((a,t)=>{ a[t.category]=(a[t.category]||0)+safeDur(t.startTime,t.endTime); return a; },{});
  const totalMin = Object.values(catStats).reduce((s,v)=>s+v,0);
  const CAT_CLR  = {'Deep Work':'bg-amber-500','Health':'bg-emerald-500','Admin':'bg-purple-500','Meeting':'bg-blue-500','Break':'bg-gray-500'};

  return (
    <div className="flex flex-col h-full animate-slide-up p-5 max-w-2xl mx-auto w-full overflow-y-auto pb-32">
      <div className="flex items-center justify-between mb-6 border-b border-white/5 pb-5">
        <div>
          <h2 className="text-2xl font-serif font-bold text-white">Daily Analytics</h2>
          <p className="text-xs text-mist uppercase tracking-widest mt-0.5">Performance Review</p>
        </div>
        <Ic n="Trend" c="w-6 h-6 text-amber-400"/>
      </div>

      <div className="bg-charcoal/50 border border-white/5 rounded-2xl p-6 mb-5 text-center relative overflow-hidden">
        <div className={`absolute inset-0 opacity-10 ${rate===100?'bg-emerald-500':'bg-amber-500'}`}></div>
        <p className="text-mist text-xs font-medium uppercase tracking-wider mb-2">Completion Rate</p>
        <div className="flex items-end justify-center gap-1">
          <span className="text-6xl font-bold text-white">{rate}</span>
          <span className="text-2xl text-mist mb-2">%</span>
        </div>
        <div className="w-full bg-gray-800 h-2 rounded-full mt-4 overflow-hidden">
          <div className={`h-full transition-all duration-1000 ${rate===100?'bg-emerald-500':'bg-amber-500'}`} style={{width:`${rate}%`}}></div>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-2.5 mb-6">
        <div className="bg-charcoal border border-white/5 rounded-xl p-3 flex flex-col items-center">
          <Ic n="Check2" c="w-5 h-5 text-emerald-400 mb-1.5"/>
          <span className="text-xl font-bold text-white">{done}</span>
          <span className="text-[10px] text-mist mt-0.5 uppercase tracking-wide">Done</span>
        </div>
        <div className="bg-charcoal border border-white/5 rounded-xl p-3 flex flex-col items-center">
          <Ic n="Circle" c="w-5 h-5 text-amber-400 mb-1.5"/>
          <span className="text-xl font-bold text-white">{pending}</span>
          <span className="text-[10px] text-mist mt-0.5 uppercase tracking-wide">Pending</span>
        </div>
        <div className="bg-charcoal border border-white/5 rounded-xl p-3 flex flex-col items-center">
          <Ic n="ArrowR" c="w-5 h-5 text-gray-500 mb-1.5"/>
          <span className="text-xl font-bold text-white">{skipped}</span>
          <span className="text-[10px] text-mist mt-0.5 uppercase tracking-wide">Skipped</span>
        </div>
      </div>

      <div className="bg-charcoal border border-white/5 rounded-xl p-4 flex items-center justify-between mb-6">
        <div className="flex items-center gap-2">
          <Ic n="Pie" c="w-5 h-5 text-blue-400"/>
          <span className="text-sm text-gray-300">Total Planned</span>
        </div>
        <span className="text-xl font-bold text-white">{totalMin>0?`${Math.round(totalMin/60*10)/10}h`:'—'}</span>
      </div>

      <h3 className="text-base font-bold text-white mb-3">Time Distribution</h3>
      {totalMin>0 ? (
        <div className="space-y-3">
          {Object.entries(catStats).sort(([,a],[,b])=>b-a).map(([cat,mins])=>{
            const pct = Math.round((mins/totalMin)*100);
            return (
              <div key={cat}>
                <div className="flex justify-between items-center mb-1">
                  <span className="text-sm text-gray-300">{cat}</span>
                  <span className="text-xs text-mist">{mins}m ({pct}%)</span>
                </div>
                <div className="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                  <div className={`h-full ${CAT_CLR[cat]||'bg-gray-500'}`} style={{width:`${pct}%`,transition:'width 0.8s ease'}}></div>
                </div>
              </div>
            );
          })}
        </div>
      ) : null}
      {total===0 && <p className="text-center text-mist text-sm mt-10">Generate a schedule to see analytics.</p>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// HISTORY VIEW — last 7 days
// ═══════════════════════════════════════════════════════════════════════════════
function HistoryView({ onLoad }) {
  const hist = readHistory();
  const entries = Object.entries(hist).sort(([a],[b])=>b.localeCompare(a));

  const CAT_DOT = {'Deep Work':'bg-amber-400','Health':'bg-emerald-400','Admin':'bg-purple-400','Meeting':'bg-blue-400','Break':'bg-gray-500'};

  const fmtDate = (iso) => {
    const today = localISO();
    const [y,mo,d] = iso.split('-').map(Number);
    const dt = new Date(y,mo-1,d);
    const yest = new Date(); yest.setDate(yest.getDate()-1);
    const yISO = `${yest.getFullYear()}-${String(yest.getMonth()+1).padStart(2,'0')}-${String(yest.getDate()).padStart(2,'0')}`;
    if (iso===today) return 'Today';
    if (iso===yISO)  return 'Yesterday';
    return dt.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  };

  return (
    <div className="flex flex-col h-full animate-slide-up p-5 max-w-2xl mx-auto w-full overflow-y-auto pb-32">
      <div className="flex items-center justify-between mb-6 border-b border-white/5 pb-5">
        <div>
          <h2 className="text-2xl font-serif font-bold text-white">Schedule History</h2>
          <p className="text-xs text-mist uppercase tracking-widest mt-0.5">Last 7 Days</p>
        </div>
        <Ic n="History" c="w-6 h-6 text-amber-400"/>
      </div>

      {entries.length===0 ? (
        <div className="flex flex-col items-center justify-center flex-grow text-center py-20">
          <Ic n="History" c="w-16 h-16 text-white/10 mb-5"/>
          <p className="text-mist text-sm">No history yet.</p>
          <p className="text-gray-600 text-xs mt-1">Generate your first schedule to start tracking.</p>
        </div>
      ) : entries.map(([date, { schedule }]) => {
        const total = schedule.length;
        const done    = schedule.filter(t=>t.completed).length;
        const skipped = schedule.filter(t=>t.skipped).length;
        const rate  = total>0 ? Math.round((done/total)*100) : 0;
        const cats  = [...new Set(schedule.map(t=>t.category))].slice(0,4);
        const barCls = rate===100 ? 'bg-emerald-500' : rate>50 ? 'bg-amber-500' : 'bg-red-500/70';

        return (
          <div key={date} className="bg-charcoal/50 border border-white/5 rounded-2xl p-4 mb-3 hover:border-white/10 transition-all group">
            <div className="flex items-start justify-between mb-3">
              <div>
                <h3 className="text-white font-semibold leading-tight">{fmtDate(date)}</h3>
                <p className="text-xs text-mist mt-0.5">{date}</p>
              </div>
              <div className="text-right shrink-0 ml-4">
                <div className={`text-xl font-bold ${rate===100?'text-emerald-400':rate>50?'text-amber-400':'text-red-400'}`}>{rate}%</div>
                <div className="text-xs text-mist">{done}/{total} done{skipped>0?` · ${skipped} skipped`:''}</div>
              </div>
            </div>
            <div className="w-full bg-gray-800/80 h-1.5 rounded-full overflow-hidden mb-3">
              <div className={`h-full ${barCls} transition-all duration-700`} style={{width:`${rate}%`}}></div>
            </div>
            <div className="flex items-center justify-between gap-2">
              <div className="flex gap-1.5 flex-wrap min-w-0">
                {cats.map(c=>(
                  <span key={c} className="flex items-center gap-1 text-xs text-mist bg-white/5 px-2 py-0.5 rounded-full shrink-0">
                    <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${CAT_DOT[c]||'bg-gray-400'}`}></span>
                    <span className="truncate max-w-[60px]">{c}</span>
                  </span>
                ))}
              </div>
              <button onClick={()=>onLoad(schedule,date)}
                className="focus-ring shrink-0 text-xs text-amber-400 hover:text-amber-300 font-semibold px-3 py-1.5 bg-amber-500/10 hover:bg-amber-500/20 rounded-lg transition-colors min-h-[36px]">
                Load Plan
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [apiKey, setApiKey]   = useState(()=>localStorage.getItem(API_KEY_STORAGE)||'');
  const [showSet, setShowSet] = useState(false);
  const [loading, setLoading] = useState(false);
  const [fixing,  setFixing]  = useState(false);
  const [toast,   setToast]   = useState(null);
  const [notifPerm, setNotifPerm] = useState(()=>{
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  });

  const notify = (msg, type='success') => setToast({ msg, type, id: Date.now() });

  const saveKey = useCallback((k)=>{
    setApiKey(k);
    try { localStorage.setItem(API_KEY_STORAGE, k); } catch(e) {}
  },[]);

  const handleNotifReq = async () => {
    const r = await askNotifPermission();
    setNotifPerm(r);
    if (r==='granted') notify("Notifications enabled! You'll be alerted before each task.", 'info');
    else if (r==='denied') notify('Notifications blocked. Enable in device settings.', 'error');
  };

  const [state, setState] = useState(()=>{
    const iso = localISO();
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        const sched = p.schedule||[];
        let mode = AppMode.BRAIN_DUMP;
        if (sched.length>0) {
          mode = AppMode.SCHEDULE;
          if ((p.planDate||iso)===iso) {
            const c = new Date().getHours()*60+new Date().getMinutes();
            if (sched.some(t=>{ const s=toMin(t.startTime),e=toMin(t.endTime); return c>=s&&c<e; })) mode=AppMode.FOCUS;
          }
        }
        return { ...p, schedule:sched, mode, error:null, planDate:p.planDate||iso };
      }
    } catch(e) {}
    return { rawInput:'', schedule:[], mode:AppMode.BRAIN_DUMP, error:null, planDate:iso };
  });

  useEffect(()=>{ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){} },[state]);

  // Re-schedule notifications whenever schedule changes
  useEffect(()=>{ if (state.schedule.length>0) scheduleNotifs(state.schedule,state.planDate); },[state.schedule,state.planDate]);

  const set = patch => setState(prev=>({...prev,...patch}));
  const switchMode = mode => set({mode});

  const handleGenerate = async () => {
    const trimmedInput = state.rawInput.trim();
    if (!trimmedInput) return;
    setLoading(true);
    set({ error: null });
    try {
      // Save current schedule to history before replacing
      if (state.schedule.length > 0) saveHistory(state.schedule, state.planDate);
      const { schedule, planDate } = await generateSchedule(trimmedInput, apiKey);
      if (!schedule || schedule.length === 0) throw new Error('No tasks were generated. Try adding more detail to your brain dump.');
      set({ schedule, planDate, mode: AppMode.SCHEDULE });
      saveHistory(schedule, planDate);
      notify(`${schedule.length} tasks scheduled ✓`, 'success');
    } catch(err) {
      const msg = err.message || 'Failed to generate schedule. Please try again.';
      set({ error: msg });
    } finally { setLoading(false); }
  };

  const handleFix = async () => {
    setFixing(true);
    try {
      const fixed = await fixScheduleAI(state.schedule, state.planDate, apiKey);
      const wasOverlapping = findOverlaps(state.schedule).size;
      set({ schedule: fixed });
      saveHistory(fixed, state.planDate);
      notify(wasOverlapping>0 ? `Overlaps resolved — schedule optimized ✓` : 'Schedule optimized by AI ✓', 'success');
    } catch(err) {
      notify(err.message||'Could not fix schedule.', 'error');
    } finally { setFixing(false); }
  };

  const updateTask = t => setState(prev=>{
    const updated = prev.schedule.map(s=>s.id===t.id?t:s);
    saveHistory(updated, prev.planDate);
    return {...prev, schedule:updated};
  });
  const deleteTask = id => setState(prev=>({...prev, schedule:prev.schedule.filter(t=>t.id!==id)}));
  const addTask = () => setState(prev=>({
    ...prev,
    schedule:[...prev.schedule,{id:crypto.randomUUID(),startTime:'09:00',endTime:'10:00',activity:'New Task',category:'Deep Work',energyRequired:'Medium',notes:'',completed:false,skipped:false,subtasks:[]}]
  }));
  const loadHistoryPlan = (schedule, planDate) => {
    set({ schedule, planDate, mode:AppMode.SCHEDULE });
    notify(`Loaded plan from ${planDate}`, 'info');
  };

  const isBrainDump = state.mode === AppMode.BRAIN_DUMP;

  return (
    <div className="min-h-screen bg-obsidian text-slate-200 font-sans selection:bg-amber-500/30 selection:text-amber-200 overflow-hidden">
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)} />}

      {/* Ambient background */}
      <div className="fixed inset-0 z-0 pointer-events-none">
        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-900/10 rounded-full blur-[120px] opacity-30"></div>
        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-amber-900/10 rounded-full blur-[120px] opacity-20"></div>
      </div>

      {/* FIX #8: safe-area top padding */}
      <main className="relative z-10 h-screen flex flex-col pt-safe">
        {/* Header (brain dump only) */}
        {isBrainDump && (
          <header className="flex items-center justify-between px-6 py-5 md:px-8 shrink-0">
            <div className="flex items-center gap-2.5">
              <Ic n="Box" c="w-6 h-6 text-white"/>
              <span className="font-serif font-bold text-xl tracking-tight text-white">Chronos</span>
              <span className="text-xs text-mist/60 ml-1 hidden sm:inline">Elite</span>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={()=>setShowSet(true)}
                className="focus-ring text-mist hover:text-white transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center rounded-lg hover:bg-white/5">
                <Ic n="Settings" c="w-5 h-5"/>
              </button>
              <span className="h-2 w-2 rounded-full bg-green-500 animate-pulse block"></span>
            </div>
          </header>
        )}

        {/* Error banner */}
        {state.error && (
          <div className="mx-5 mt-3 p-3.5 bg-red-900/20 border border-red-500/30 text-red-200 rounded-xl text-sm text-center shrink-0">
            {state.error}
            {state.error.toLowerCase().includes('api key') && (
              <button onClick={()=>setShowSet(true)} className="block mt-1 text-xs text-red-300 underline mx-auto">Open Settings</button>
            )}
          </div>
        )}

        {/* Content */}
        <div className="flex-grow flex flex-col overflow-hidden">
          {state.mode===AppMode.BRAIN_DUMP && (
            <BrainDump value={state.rawInput} onChange={v=>set({rawInput:v})} onGenerate={handleGenerate}
              loading={loading} hasSchedule={state.schedule.length>0}
              onCancel={()=>set({mode:AppMode.SCHEDULE})} onOpenSettings={()=>setShowSet(true)} apiKey={apiKey} />
          )}
          {state.mode===AppMode.SCHEDULE && (
            <ScheduleView schedule={state.schedule} planDate={state.planDate}
              onReset={()=>set({mode:AppMode.BRAIN_DUMP})} onUpdate={updateTask} onDelete={deleteTask} onAdd={addTask}
              onFix={handleFix} fixing={fixing} />
          )}
          {state.mode===AppMode.FOCUS   && <FocusMode schedule={state.schedule} planDate={state.planDate} onUpdate={updateTask}/>}
          {state.mode===AppMode.STATS   && <StatsView schedule={state.schedule}/>}
          {state.mode===AppMode.HISTORY && <HistoryView onLoad={loadHistoryPlan}/>}
        </div>

        {/* Bottom Navigation — FIX #8: safe area bottom padding */}
        {!isBrainDump && (
          <nav className="border-t border-white/5 bg-charcoal/90 backdrop-blur-xl pt-2 pb-safe px-4 shrink-0 sticky bottom-0 z-20">
            <div className="flex justify-around items-center max-w-md mx-auto">
              {[
                { mode:AppMode.SCHEDULE, n:'Layers',    label:'Plan'    },
                { mode:AppMode.FOCUS,    n:'PlayCirc',  label:'Focus'   },
                { mode:AppMode.STATS,    n:'BarChart',  label:'Stats'   },
                { mode:AppMode.HISTORY,  n:'History',   label:'History' },
              ].map(({mode,n,label})=>(
                <button key={mode} onClick={()=>switchMode(mode)}
                  className={`focus-ring flex flex-col items-center gap-1 transition-colors min-w-[52px] min-h-[52px] justify-center rounded-lg ${state.mode===mode?'text-amber-400':'text-gray-500 hover:text-white'}`}>
                  <Ic n={n} c="w-5 h-5"/>
                  <span className="text-[10px] uppercase tracking-wider font-semibold">{label}</span>
                </button>
              ))}
              <button onClick={()=>setShowSet(true)}
                className="focus-ring flex flex-col items-center gap-1 transition-colors text-gray-500 hover:text-white min-w-[52px] min-h-[52px] justify-center rounded-lg">
                <Ic n="Settings" c="w-5 h-5"/>
                <span className="text-[10px] uppercase tracking-wider font-semibold">Config</span>
              </button>
            </div>
          </nav>
        )}
      </main>

      <SettingsModal open={showSet} onClose={()=>setShowSet(false)}
        apiKey={apiKey} onSave={saveKey} notifPerm={notifPerm} onReqNotif={handleNotifReq} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
